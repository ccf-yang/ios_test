name: Build Unsigned IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-ipa:
    name: Build IPA on macOS
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      # 1. 使用 maxim-lobanov/setup-xcode 指定版本
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.6.0' 

      # 2. 缓存 SPM 依赖，加速后续构建（非常推荐的做法）
      - name: Cache Swift Package Manager
        uses: actions/cache@v3
        with:
          path: ./SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # 3. 拉取 SPM 第三方库依赖
      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project TodoReminder.xcodeproj \
            -scheme TodoReminder \
            -clonedSourcePackagesDirPath ./SourcePackages

      # 4. 构建 Archive (复用您之前的无签名参数，加上 SPM 目录指向)
      - name: Build Archive
        run: |
          xcodebuild archive \
            -project TodoReminder.xcodeproj \
            -scheme TodoReminder \
            -archivePath build/TodoReminder.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            -clonedSourcePackagesDirPath ./SourcePackages \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      # 5. 生成导出 IPA 所需的 plist 配置
      - name: Create ExportOptions.plist
        run: |
          cat <<EOF > build/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict/>
              <key>signingCertificate</key>
              <string></string>
              <key>teamID</key>
              <string></string>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

      # 6. 导出无证书 IPA
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/TodoReminder.xcarchive \
            -exportPath build/output \
            -exportOptionsPlist build/ExportOptions.plist \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      # 7. 上传构建产物供下载
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TodoReminder-Unsigned-IPA
          path: build/output/*.ipa
