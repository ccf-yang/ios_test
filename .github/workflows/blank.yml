name: Build Unsigned IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-ipa:
    name: Build IPA on macOS
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.6.0'

      # 【新增步骤 1】：安装 xcodegen 工具
      - name: Install XcodeGen
        run: brew install xcodegen

      # 【新增步骤 2】：根据 project.yml 自动生成 TodoReminder.xcodeproj
      - name: Generate Xcode Project
        run: |
          echo "当前目录文件："
          ls -la
          xcodegen generate
          echo "生成后的目录文件："
          ls -la

      - name: Cache Swift Package Manager
        uses: actions/cache@v3
        with:
          path: ./SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve Swift Package dependencies
        env:
          GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          xcodebuild -resolvePackageDependencies \
            -project TodoReminder.xcodeproj \
            -scheme TodoReminder \
            -clonedSourcePackagesDirPath ./SourcePackages

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project TodoReminder.xcodeproj \
            -scheme TodoReminder \
            -archivePath build/TodoReminder.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            -clonedSourcePackagesDirPath ./SourcePackages \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""


      - name: Create Unsigned IPA
        run: |
          # 确保输出目录存在
          mkdir -p build/output
          
          # 创建 Payload 目录
          mkdir -p Payload
          
          # 从 xcarchive 中复制 .app 文件
          cp -R build/TodoReminder.xcarchive/Products/Applications/TodoReminder.app Payload/
          
          # 打包成 IPA（本质是 zip 文件）
          zip -r build/output/TodoReminder.ipa Payload
          
          # 清理临时目录
          rm -rf Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TodoReminder-Unsigned-IPA
          path: build/output/*.ipa
