name: Build Unsigned IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 自动解析 Package.resolved 并缓存 SPM 依赖，加速构建
      - name: Cache Swift Package Manager
        uses: actions/cache@v3
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      # 修改点：增加 resolve 步骤，并延长超时时间以应对网络拉取慢的情况
      - name: Resolve Swift Package Manager Dependencies
        run: xcodebuild -resolvePackageDependencies -project TodoReminder.xcodeproj -scheme TodoReminder
        env:
          GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 利用 GitHub 内置 token 提高拉取速率

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project TodoReminder.xcodeproj \
            -scheme TodoReminder \
            -archivePath build/TodoReminder.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create ExportOptions.plist
        run: |
          cat <<EOF > build/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict/>
              <key>signingCertificate</key>
              <string></string>
              <key>teamID</key>
              <string></string>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/TodoReminder.xcarchive \
            -exportPath build/output \
            -exportOptionsPlist build/ExportOptions.plist \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TodoReminder-Unsigned-IPA
          path: build/output/*.ipa
