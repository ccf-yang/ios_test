name: TodoReminder
options:
  bundleIdPrefix: com.ccf-yang
  deploymentTarget:
    iOS: "16.2"
packages:
  FSCalendar:
    url: https://github.com/WenchaoD/FSCalendar.git
    from: 2.8.4
targets:
  TodoReminder:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Models
      - path: ViewModels
      # 修改点：显式添加 Views 下的根级文件及子目录
      - path: Views
      - path: Views/Calendar
      - path: Views/AddRecord
      - path: Views/FutureList
      - path: Utils
    dependencies:
      - package: FSCalendar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ccf-yang.TodoReminder
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: TodoReminder
        UILaunchScreen:
          UIColorName: ""
