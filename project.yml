name: TodoReminder
options:
  bundleIdPrefix: com.ccf
  deploymentTarget:
    iOS: "16.2"
targets:
  TodoReminder:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "test.file"
      - path: Models
        excludes:
          - "test.file"
      - path: ViewModels
        excludes:
          - "test.file"
      - path: Views
        excludes:
          - "**/test.file"
      - path: Utils
        excludes:
          - "test.file"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ccf.TodoReminder
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: TodoReminder
        UILaunchScreen:
          UIColorName: ""
