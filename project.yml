name: TodoReminder
options:
  bundleIdPrefix: com.ccf
  deploymentTarget:
    iOS: "16.2"
packages:
  FSCalendar:
    url: https://github.com/WenchaoD/FSCalendar.git
    from: 2.8.4
targets:
  TodoReminder:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Models
      - path: ViewModels
      # 修改点：确保 Views 及其所有子目录的 swift 文件被包含
      - path: Views
        type: group
      - path: Utils
    dependencies:
      - package: FSCalendar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ccf.TodoReminder
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: TodoReminder
        UILaunchScreen:
          UIColorName: ""
