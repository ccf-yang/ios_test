name: TodoReminder
options:
  bundleIdPrefix: com.ccf-yang
  deploymentTarget:
    iOS: "16.2"
# 【新增】声明 SPM 第三方库地址
packages:
  FSCalendar:
    url: https://github.com/WenchaoD/FSCalendar.git
    from: 2.8.4
targets:
  TodoReminder:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Models
      - path: ViewModels
      - path: Views
      - path: Utils
    # 【新增】将第三方库关联到 Target
    dependencies:
      - package: FSCalendar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ccf-yang.TodoReminder
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: TodoReminder
        UILaunchScreen:
          UIColorName: ""
