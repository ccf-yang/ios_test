name: TodoReminder
options:
  bundleIdPrefix: com.ccf
  deploymentTarget:
    iOS: "16.2"
targets:
  TodoReminder:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Models
      - path: ViewModels
      - path: Views
      - path: Utils
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ccf.TodoReminder
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
